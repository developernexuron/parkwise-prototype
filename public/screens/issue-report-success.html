<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ParkWise - Issue Reporting (Success)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', "Liberation Mono", "Courier New", 'monospace'],
                    },
                    colors: {
                        brand: {
                            navy: '#14223A',
                            gold: '#E6A129',
                            success: '#28A745',
                            danger: '#DC3545',
                            gray: '#1C1C1E',
                            lightGray: '#2C2C2E',
                            muted: '#8E8E93',
                            swish: '#FFD100',
                            swishBlue: '#005596',
                            blue: '#444CE7',
                        }
                    },
                    backgroundImage: {
                        'radial-gradient': 'radial-gradient(circle at center, #1E3354 0%, #14223A 100%)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #14223A;
            color: #FFFFFF;
            overflow: hidden;
        }
        
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Success Animation Keyframes */
        @keyframes scaleIn {
            0% { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes drawCheck {
            0% { stroke-dashoffset: 100; }
            100% { stroke-dashoffset: 0; }
        }
        .animate-scale-in {
            animation: scaleIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        .animate-check {
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: drawCheck 0.4s ease-out 0.4s forwards;
        }
    </style>
</head>
<body class="bg-radial-gradient min-h-[100dvh] flex flex-col items-center justify-center relative m-0 p-0" data-pw-screen="issue-report-success">

    <!-- Mobile Container Wrapper -->
    <div id="app-container" class="w-full max-w-[375px] h-[100dvh] mx-auto relative flex flex-col px-0 pt-0 z-10 bg-[#F9FAFB] text-brand-navy rounded-none sm:rounded-[40px] sm:h-[812px] sm:my-8 overflow-hidden shadow-2xl">
        
        <!-- Header -->
        <div id="header" class="pt-12 pb-4 px-5 bg-white shadow-[0_2px_12px_rgba(20,34,58,0.04)] relative z-30 border-b border-brand-navy/5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <!-- Empty div to balance the header -->
                <div class="w-8 h-8"></div>
                <h1 class="text-[20px] font-bold text-brand-navy">Report Submitted</h1>
            </div>
            <!-- Close button instead of back -->
            <button class="w-8 h-8 flex items-center justify-center rounded-full bg-brand-navy/5 text-brand-navy hover:bg-brand-navy/10 transition-colors">
                <i class="fa-solid fa-xmark text-[16px]"></i>
            </button>
        </div>

        <!-- Scrollable Content Area -->
        <div id="main-content" class="flex-1 overflow-y-auto hide-scrollbar pb-[120px] bg-[#F9FAFB] flex flex-col items-center justify-start pt-10 px-5">
            
            <!-- Success Animation Hero -->
            <div class="flex flex-col items-center justify-center mb-10 w-full">
                <div class="w-24 h-24 rounded-full bg-brand-success/10 flex items-center justify-center mb-6 animate-scale-in relative">
                    <div class="absolute inset-0 rounded-full border-4 border-brand-success/20 animate-pulse"></div>
                    <svg class="w-12 h-12 text-brand-success" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                        <path class="animate-check" stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
                
                <h2 class="text-[24px] font-bold text-brand-navy text-center mb-2">Thank You!</h2>
                <p class="text-[14px] text-brand-navy/60 text-center max-w-[280px] leading-relaxed">
                    Your report has been successfully submitted to the Stockholm parking authority.
                </p>
            </div>

            <!-- Report Details Card -->
            <div class="w-full bg-white rounded-[24px] p-5 shadow-[0_8px_24px_rgba(20,34,58,0.06)] border border-brand-navy/5 mb-6">
                
                <div class="flex items-center justify-between mb-5 pb-5 border-b border-brand-navy/5">
                    <div class="flex flex-col">
                        <span class="text-[12px] font-medium text-brand-navy/50 uppercase tracking-wider mb-1">Report ID</span>
                        <span class="font-mono text-[18px] font-bold text-brand-navy tracking-tight">PW-8472-X9</span>
                    </div>
                    <button class="w-8 h-8 rounded-full bg-brand-navy/5 flex items-center justify-center text-brand-navy hover:bg-brand-navy/10 transition-colors" title="Copy ID">
                        <i class="fa-regular fa-copy text-[14px]"></i>
                    </button>
                </div>

                <div class="flex flex-col gap-4">
                    <!-- Detail Row -->
                    <div class="flex items-start gap-3">
                        <div class="w-8 h-8 rounded-[10px] bg-brand-navy/5 flex items-center justify-center text-brand-navy/60 flex-shrink-0 mt-0.5">
                            <i class="fa-solid fa-location-dot text-[14px]"></i>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-[11px] font-medium text-brand-navy/50">Location</span>
                            <span class="text-[14px] font-semibold text-brand-navy">Sveavägen 44</span>
                        </div>
                    </div>

                    <!-- Detail Row -->
                    <div class="flex items-start gap-3">
                        <div class="w-8 h-8 rounded-[10px] bg-brand-navy/5 flex items-center justify-center text-brand-navy/60 flex-shrink-0 mt-0.5">
                            <i class="fa-solid fa-tag text-[14px]"></i>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-[11px] font-medium text-brand-navy/50">Issue Type</span>
                            <span class="text-[14px] font-semibold text-brand-navy">Wrong Price</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Next Steps / Action Timeline -->
            <div class="w-full bg-white rounded-[24px] p-5 shadow-[0_8px_24px_rgba(20,34,58,0.06)] border border-brand-navy/5 mb-8">
                <h3 class="text-[15px] font-bold text-brand-navy mb-4">What happens next?</h3>
                
                <div class="relative border-l-2 border-brand-navy/10 ml-3 pl-5 pb-4">
                    <div class="absolute -left-[9px] top-0 w-4 h-4 rounded-full bg-brand-success border-2 border-white"></div>
                    <h4 class="text-[14px] font-semibold text-brand-navy mb-1">Report Received</h4>
                    <p class="text-[12px] text-brand-navy/60">We've logged your issue securely.</p>
                </div>
                
                <div class="relative border-l-2 border-transparent ml-3 pl-5">
                    <div class="absolute -left-[9px] top-0 w-4 h-4 rounded-full bg-brand-navy/10 border-2 border-white"></div>
                    <h4 class="text-[14px] font-semibold text-brand-navy mb-1">Under Review</h4>
                    <p class="text-[12px] text-brand-navy/60">Expected review time: <span class="font-semibold text-brand-navy">24-48 hours</span></p>
                </div>
            </div>

            <!-- Primary Actions -->
            <div class="w-full flex flex-col gap-3">
                <button class="w-full h-[56px] rounded-[20px] bg-brand-gold text-[16px] font-bold text-brand-navy shadow-[0_8px_24px_rgba(230,161,41,0.25)] hover:bg-brand-gold/90 hover:-translate-y-0.5 transition-all flex items-center justify-center gap-2">
                    View Report Status
                </button>
                <button class="w-full h-[56px] rounded-[20px] bg-transparent border-2 border-brand-navy/10 text-[16px] font-bold text-brand-navy hover:bg-brand-navy/5 transition-all flex items-center justify-center">
                    Back to Map
                </button>
            </div>

        </div>

        <!-- BOTTOM UI: Navigation (Preserved exactly from context, Profile Active) -->
        <div id="footer" class="absolute bottom-0 left-0 w-full z-50 flex flex-col pointer-events-none">
            <!-- Bottom Navigation Bar -->
            <div class="bg-white rounded-t-[24px] shadow-[0_-4px_20px_rgba(0,0,0,0.05)] px-6 py-4 pb-8 flex items-center justify-between relative z-50 text-brand-navy border-t border-brand-navy/5 pointer-events-auto">
                
                <!-- Home Map -->
                <button class="flex flex-col items-center gap-1 text-gray-400 hover:text-brand-navy transition-colors">
                    <div class="w-12 h-8 flex items-center justify-center">
                        <i class="fa-solid fa-map text-[18px]"></i>
                    </div>
                    <span class="text-[10px] font-medium">Map</span>
                </button>

                <!-- Search/Filters -->
                <button class="flex flex-col items-center gap-1 text-gray-400 hover:text-brand-navy transition-colors">
                    <div class="w-12 h-8 flex items-center justify-center">
                        <i class="fa-solid fa-magnifying-glass text-[18px]"></i>
                    </div>
                    <span class="text-[10px] font-medium">Search</span>
                </button>

                <!-- Scanner -->
                <button class="flex flex-col items-center gap-1 text-brand-navy relative -top-6">
                    <div class="w-14 h-14 bg-brand-navy rounded-full flex items-center justify-center text-white shadow-[0_8px_16px_rgba(20,34,58,0.3)] border-4 border-white">
                        <i class="fa-solid fa-camera text-[22px]"></i>
                    </div>
                    <span class="text-[10px] font-bold mt-1">Scan</span>
                </button>

                <!-- Bookings History -->
                <button class="flex flex-col items-center gap-1 text-gray-400 hover:text-brand-navy transition-colors">
                    <div class="w-12 h-8 flex items-center justify-center relative">
                        <i class="fa-solid fa-clock-rotate-left text-[18px]"></i>
                    </div>
                    <span class="text-[10px] font-medium">History</span>
                </button>

                <!-- Side Menu (Profile Active) -->
                <button class="flex flex-col items-center gap-1 text-brand-navy transition-colors">
                    <div class="w-12 h-8 flex items-center justify-center relative">
                        <i class="fa-solid fa-bars text-[18px]"></i>
                    </div>
                    <span class="text-[10px] font-bold">Menu</span>
                </button>
            </div>
        </div>

    </div>


<script defer src="/prototype-bridge.js"></script>
</body>
</html>
