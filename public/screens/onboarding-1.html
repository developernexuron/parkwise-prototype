<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ParkWise - Onboarding Step 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            navy: '#14223A',
                            gold: '#E6A129',
                            success: '#28A745',
                            danger: '#DC3545',
                        }
                    },
                    backgroundImage: {
                        'radial-gradient': 'radial-gradient(circle at center, #1E3354 0%, #14223A 100%)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #14223A;
            color: #FFFFFF;
            overflow: hidden;
        }
        
        /* Fade in animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }

        /* Float animation for map markers */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }
        .animate-float-delay-1 { animation-delay: 0.5s; }
        .animate-float-delay-2 { animation-delay: 1s; }
        .animate-float-delay-3 { animation-delay: 1.5s; }
        .animate-float-delay-4 { animation-delay: 2s; }
    </style>
</head>
<body class="bg-radial-gradient min-h-[100dvh] flex flex-col items-center justify-center relative" data-pw-screen="onboarding-1">

    <!-- Mobile Container Wrapper -->
    <div class="w-full max-w-[375px] h-[100dvh] mx-auto relative flex flex-col justify-between px-6 py-10 z-10 bg-white text-brand-navy rounded-none sm:rounded-[40px] sm:h-[812px] sm:my-8 overflow-hidden shadow-2xl">
        
        <!-- Header (Skip / Progress) -->
        <div class="flex justify-between items-center w-full pt-2 z-20">
            <!-- Progress Dots -->
            <div class="flex gap-2 items-center">
                <div class="w-8 h-2 rounded-full bg-brand-navy"></div>
                <div class="w-2 h-2 rounded-full bg-gray-200"></div>
                <div class="w-2 h-2 rounded-full bg-gray-200"></div>
            </div>
            
            <!-- Skip Button -->
            <button class="text-sm font-semibold text-gray-400 hover:text-brand-navy transition-colors px-2 py-1">
                Skip
            </button>
        </div>

        <!-- Main Content Area -->
        <div class="flex-1 flex flex-col mt-8 z-10 animate-fade-in relative">
            
            <!-- Abstract Map Visualization (Inspired by reference's circular layout) -->
            <div class="relative w-full aspect-square max-w-[280px] mx-auto mb-8 flex items-center justify-center">
                <!-- Outer dashed ring -->
                <div class="absolute inset-0 rounded-full border border-dashed border-gray-200 opacity-60 m-4"></div>
                
                <!-- Inner solid rings (Soft purple/blue gradient from brief) -->
                <div class="absolute inset-0 rounded-full bg-gradient-to-tr from-[#E6E0F8] to-[#E0F2FE] opacity-40 m-12"></div>
                <div class="absolute inset-0 rounded-full bg-gradient-to-tr from-[#E6E0F8] to-[#E0F2FE] opacity-60 m-20"></div>
                
                <!-- Center Hero Marker -->
                <div class="relative z-10 w-24 h-24 bg-white rounded-full shadow-[0_8px_30px_rgba(20,34,58,0.1)] flex items-center justify-center border-4 border-[#E6E0F8]">
                    <div class="w-16 h-16 bg-brand-navy rounded-full flex items-center justify-center text-white">
                        <i class="fa-solid fa-location-dot text-2xl"></i>
                    </div>
                </div>

                <!-- Orbiting Legend Markers -->
                <!-- Free Parking -->
                <div class="absolute top-[10%] left-[15%] animate-float animate-float-delay-1">
                    <div class="bg-white p-1 rounded-full shadow-md border-2 border-brand-success">
                        <div class="w-8 h-8 rounded-full bg-brand-success/10 flex items-center justify-center text-brand-success">
                            <i class="fa-solid fa-square-parking text-sm"></i>
                        </div>
                    </div>
                </div>

                <!-- Paid Parking -->
                <div class="absolute top-[5%] right-[25%] animate-float animate-float-delay-2">
                    <div class="bg-white p-1 rounded-full shadow-md border-2 border-[#F97316]">
                        <div class="w-8 h-8 rounded-full bg-[#F97316]/10 flex items-center justify-center text-[#F97316]">
                            <i class="fa-solid fa-coins text-sm"></i>
                        </div>
                    </div>
                </div>

                <!-- EV Charging -->
                <div class="absolute bottom-[25%] right-[5%] animate-float animate-float-delay-3">
                    <div class="bg-white p-1 rounded-full shadow-md border-2 border-[#3B82F6]">
                        <div class="w-8 h-8 rounded-full bg-[#3B82F6]/10 flex items-center justify-center text-[#3B82F6]">
                            <i class="fa-solid fa-bolt text-sm"></i>
                        </div>
                    </div>
                </div>

                <!-- Restricted -->
                <div class="absolute bottom-[10%] left-[20%] animate-float animate-float-delay-4">
                    <div class="bg-white p-1 rounded-full shadow-md border-2 border-brand-danger">
                        <div class="w-8 h-8 rounded-full bg-brand-danger/10 flex items-center justify-center text-brand-danger">
                            <i class="fa-solid fa-ban text-sm"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Typography & Copy -->
            <div class="text-left px-2">
                <h1 class="text-[32px] leading-[1.1] font-bold text-brand-navy mb-4 tracking-tight">
                    Real-time <br>
                    parking <span class="bg-brand-navy text-white px-2 py-0.5 rounded-lg inline-block mt-1">status</span>
                </h1>
                
                <p class="text-[15px] text-gray-500 font-medium leading-relaxed mb-6">
                    Instantly spot free, paid, or EV charging spots across Stockholm with live map markers.
                </p>

                <!-- Mini Legend List -->
                <div class="flex flex-wrap gap-2 mb-8">
                    <span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-gray-50 border border-gray-100 text-xs font-semibold text-gray-600">
                        <span class="w-2 h-2 rounded-full bg-brand-success"></span> Free
                    </span>
                    <span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-gray-50 border border-gray-100 text-xs font-semibold text-gray-600">
                        <span class="w-2 h-2 rounded-full bg-[#F97316]"></span> Paid
                    </span>
                    <span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-gray-50 border border-gray-100 text-xs font-semibold text-gray-600">
                        <span class="w-2 h-2 rounded-full bg-[#3B82F6]"></span> EV
                    </span>
                </div>
            </div>
            
            <!-- Spacer to push button to bottom -->
            <div class="flex-grow"></div>
            
            <!-- Action Button -->
            <button class="w-full bg-brand-navy hover:bg-[#1E3354] text-white font-bold py-4 px-6 rounded-2xl transition-colors shadow-[0_8px_20px_rgba(20,34,58,0.2)] flex items-center justify-center gap-2 group mt-auto">
                Continue
                <i class="fa-solid fa-arrow-right transition-transform group-hover:translate-x-1"></i>
            </button>
        </div>
    </div>


<script defer src="/prototype-bridge.js"></script>
</body>
</html>
