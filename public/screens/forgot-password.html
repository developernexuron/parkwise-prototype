<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ParkWise - Reset Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            navy: '#14223A',
                            gold: '#E6A129',
                            success: '#28A745',
                            danger: '#DC3545',
                        }
                    },
                    backgroundImage: {
                        'radial-gradient': 'radial-gradient(circle at center, #1E3354 0%, #14223A 100%)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #14223A;
            color: #FFFFFF;
            overflow: hidden;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-scale-in {
            animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body class="bg-radial-gradient min-h-[100dvh] flex flex-col items-center justify-center relative m-0 p-0" data-pw-screen="forgot-password">

    <!-- Mobile Container Wrapper -->
    <div id="app-container" class="w-full max-w-[375px] h-[100dvh] mx-auto relative flex flex-col px-0 pt-0 z-10 bg-white text-brand-navy rounded-none sm:rounded-[40px] sm:h-[812px] sm:my-8 overflow-hidden shadow-2xl">
        
        <!-- Back Button (Auth Flow Specific) -->
        <div class="absolute top-6 left-6 z-20">
            <a href="#" class="w-10 h-10 rounded-full bg-white shadow-sm border border-gray-100 flex items-center justify-center text-brand-navy hover:bg-gray-50 transition-colors">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
        </div>

        <!-- Main Content Area -->
        <div class="flex-1 flex flex-col px-6 z-10 relative overflow-y-auto pt-24 pb-10" style="scrollbar-width: none;">
            
            <!-- STATE 1: Request Reset Form -->
            <div id="request_state" class="flex flex-col flex-1 animate-fade-in">
                <!-- Header Section -->
                <div id="reset_header" class="flex flex-col mb-8">
                    <h1 class="text-[32px] font-bold text-brand-navy mb-2 tracking-tight">Reset password</h1>
                    <p class="text-[15px] text-gray-500 font-medium leading-relaxed">
                        Enter the email associated with your account and we'll send you a link to reset your password.
                    </p>
                </div>

                <!-- Reset Form -->
                <form id="reset_form" class="flex flex-col gap-5 flex-1">
                    
                    <!-- Email Input -->
                    <div class="flex flex-col gap-2">
                        <label for="reset_email" class="text-[14px] font-semibold text-gray-700">Email address</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fa-regular fa-envelope text-gray-400"></i>
                            </div>
                            <input type="email" id="reset_email" placeholder="name@example.com" class="w-full h-[48px] bg-gray-50 border border-gray-200 text-brand-navy text-[15px] rounded-[12px] pl-11 pr-4 focus:outline-none focus:border-brand-navy focus:ring-1 focus:ring-brand-navy transition-all placeholder:text-gray-400 font-medium" required>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <button type="button" id="send-reset-btn" class="w-full h-[52px] bg-brand-gold hover:bg-[#D5901F] text-brand-navy font-bold rounded-[12px] transition-colors shadow-[0_8px_20px_rgba(230,161,41,0.2)] flex items-center justify-center text-[16px] mt-4">
                        Send Reset Link
                    </button>
                </form>
            </div>

            <!-- STATE 2: Confirmation & Timer (Hidden by default) -->
            <div id="confirmation_state" class="hidden flex-col items-center flex-1 justify-center pb-20">
                
                <!-- Success Icon -->
                <div class="w-20 h-20 rounded-full bg-brand-success/10 flex items-center justify-center mb-6 animate-scale-in">
                    <div class="w-14 h-14 rounded-full bg-brand-success flex items-center justify-center shadow-[0_8px_16px_rgba(40,167,69,0.25)]">
                        <i class="fa-solid fa-envelope-open-text text-white text-[24px]"></i>
                    </div>
                </div>

                <div class="text-center animate-fade-in" style="animation-delay: 0.1s;">
                    <h2 class="text-[28px] font-bold text-brand-navy mb-3 tracking-tight">Check your inbox</h2>
                    <p class="text-[15px] text-gray-500 font-medium leading-relaxed mb-8 px-4">
                        We've sent a password reset link to <br>
                        <strong id="display_email" class="text-brand-navy">name@example.com</strong>
                    </p>

                    <!-- Open Email App Button -->
                    <button type="button" class="w-full h-[52px] bg-brand-navy hover:bg-[#1E3354] text-white font-bold rounded-[12px] transition-colors flex items-center justify-center gap-2 text-[16px] mb-6">
                        <i class="fa-regular fa-envelope"></i>
                        Open Email App
                    </button>

                    <!-- Resend Timer Area -->
                    <div class="flex flex-col items-center gap-2">
                        <p class="text-[14px] text-gray-500 font-medium">Didn't receive the email?</p>
                        <button id="resend-btn" class="text-[14px] font-bold text-gray-400 cursor-not-allowed transition-colors" disabled>
                            Resend link in <span id="timer">00:59</span>
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- Spacer to push footer down -->
            <div class="flex-grow min-h-[32px]"></div>
            
            <!-- Back to Login Footer Link -->
            <div id="auth_footer_links" class="mt-auto shrink-0 w-full text-center pb-2 animate-fade-in" style="animation-delay: 0.2s;">
                <p class="text-[14px] text-gray-500 font-medium">
                    <a href="#" class="font-bold text-brand-navy hover:text-brand-gold transition-colors flex items-center justify-center gap-2">
                        <i class="fa-solid fa-arrow-left text-[12px]"></i>
                        Back to Login
                    </a>
                </p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const sendBtn = document.getElementById('send-reset-btn');
            const emailInput = document.getElementById('reset_email');
            const requestState = document.getElementById('request_state');
            const confirmationState = document.getElementById('confirmation_state');
            const displayEmail = document.getElementById('display_email');
            const resendBtn = document.getElementById('resend-btn');
            const timerSpan = document.getElementById('timer');
            
            let countdownInterval;

            function startTimer(duration) {
                let timer = duration;
                resendBtn.disabled = true;
                resendBtn.classList.remove('text-brand-navy', 'hover:text-brand-gold');
                resendBtn.classList.add('text-gray-400', 'cursor-not-allowed');
                
                clearInterval(countdownInterval);
                
                countdownInterval = setInterval(function () {
                    let seconds = parseInt(timer % 60, 10);
                    seconds = seconds < 10 ? "0" + seconds : seconds;
                    
                    timerSpan.textContent = "00:" + seconds;
                    resendBtn.innerHTML = `Resend link in <span id="timer">00:${seconds}</span>`;

                    if (--timer < 0) {
                        clearInterval(countdownInterval);
                        resendBtn.disabled = false;
                        resendBtn.innerHTML = 'Resend link now';
                        resendBtn.classList.remove('text-gray-400', 'cursor-not-allowed');
                        resendBtn.classList.add('text-brand-navy', 'hover:text-brand-gold');
                    }
                }, 1000);
            }

            sendBtn.addEventListener('click', () => {
                const emailValue = emailInput.value;
                
                if(emailValue === '') {
                    emailInput.classList.add('border-brand-danger', 'focus:ring-brand-danger', 'focus:border-brand-danger');
                    return;
                }
                
                emailInput.classList.remove('border-brand-danger', 'focus:ring-brand-danger', 'focus:border-brand-danger');
                
                // Show loading state
                sendBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Sending...';
                sendBtn.classList.add('opacity-80', 'cursor-not-allowed');
                
                // Simulate API call
                setTimeout(() => {
                    displayEmail.textContent = emailValue;
                    
                    // Transition states
                    requestState.classList.add('hidden');
                    confirmationState.classList.remove('hidden');
                    confirmationState.classList.add('flex');
                    
                    // Start 59s timer
                    startTimer(59);
                }, 1000);
            });

            resendBtn.addEventListener('click', () => {
                if (!resendBtn.disabled) {
                    // Simulate resend
                    resendBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Sending...';
                    resendBtn.classList.add('text-gray-400', 'cursor-not-allowed');
                    resendBtn.classList.remove('text-brand-navy', 'hover:text-brand-gold');
                    
                    setTimeout(() => {
                        startTimer(59);
                    }, 800);
                }
            });
        });
    </script>

<script defer src="/prototype-bridge.js"></script>
</body>
</html>
