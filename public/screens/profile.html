<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ParkWise - Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            navy: '#14223A',
                            gold: '#E6A129',
                            success: '#28A745',
                            danger: '#DC3545',
                            gray: '#1C1C1E',
                            lightGray: '#2C2C2E',
                            muted: '#8E8E93',
                            swish: '#FFD100',
                            swishBlue: '#005596',
                            blue: '#444CE7',
                        }
                    },
                    backgroundImage: {
                        'radial-gradient': 'radial-gradient(circle at center, #1E3354 0%, #14223A 100%)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #14223A;
            color: #FFFFFF;
            overflow: hidden;
        }
        
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Toggle Switch Styles */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #14223A;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #14223A;
        }
    </style>
</head>
<body class="bg-radial-gradient min-h-[100dvh] flex flex-col items-center justify-center relative m-0 p-0" data-pw-screen="profile">

    <!-- Mobile Container Wrapper -->
    <div id="app-container" class="w-full max-w-[375px] h-[100dvh] mx-auto relative flex flex-col px-0 pt-0 z-10 bg-[#F9FAFB] text-brand-navy rounded-none sm:rounded-[40px] sm:h-[812px] sm:my-8 overflow-hidden shadow-2xl">
        
        <!-- Header -->
        <div class="pt-12 pb-4 px-5 bg-white shadow-[0_2px_12px_rgba(20,34,58,0.04)] relative z-30 border-b border-brand-navy/5">
            <h1 class="text-[24px] font-bold text-brand-navy">Profile</h1>
        </div>

        <!-- Scrollable Content Area -->
        <div class="flex-1 overflow-y-auto hide-scrollbar pb-[100px] bg-[#F9FAFB]">
            
            <div class="px-5 py-6">
                
                <!-- Profile Header & Plan -->
                <div class="bg-white rounded-[24px] p-5 shadow-[0_4px_20px_rgba(20,34,58,0.06)] border border-brand-navy/5 mb-6 relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-brand-gold/10 rounded-full blur-[20px] -mr-10 -mt-10"></div>
                    <div class="flex items-center gap-4 relative z-10">
                        <div class="w-16 h-16 rounded-full overflow-hidden border-2 border-brand-gold shrink-0">
                            <img class="w-full h-full object-cover" src="https://storage.googleapis.com/uxpilot-auth.appspot.com/bc26989491-c4126962720b1b9821c2.png" alt="https://storage.googleapis.com/uxpilot-auth.appspot.com/avatars/avatar-2.jpg" />
                        </div>
                        <div class="flex-1">
                            <h2 class="text-[20px] font-bold text-brand-navy mb-1">Alex Lindström</h2>
                            <p class="text-[14px] text-brand-navy/60 mb-2">alex.l@example.com</p>
                            <div class="inline-flex items-center gap-1.5 px-3 py-1 bg-brand-gold/15 text-brand-gold rounded-full text-[12px] font-bold">
                                <i class="fa-solid fa-crown text-[10px]"></i> Premium Plan
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Account Shortcuts Grid -->
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <button class="bg-white rounded-[16px] p-4 shadow-[0_2px_12px_rgba(20,34,58,0.04)] border border-brand-navy/5 flex flex-col items-center justify-center gap-2 hover:bg-brand-navy/5 transition-colors">
                        <div class="w-10 h-10 rounded-full bg-brand-navy/5 flex items-center justify-center text-brand-navy">
                            <i class="fa-solid fa-car text-[18px]"></i>
                        </div>
                        <span class="text-[13px] font-bold text-brand-navy">Vehicles</span>
                    </button>
                    <button class="bg-white rounded-[16px] p-4 shadow-[0_2px_12px_rgba(20,34,58,0.04)] border border-brand-navy/5 flex flex-col items-center justify-center gap-2 hover:bg-brand-navy/5 transition-colors">
                        <div class="w-10 h-10 rounded-full bg-brand-navy/5 flex items-center justify-center text-brand-navy">
                            <i class="fa-solid fa-credit-card text-[18px]"></i>
                        </div>
                        <span class="text-[13px] font-bold text-brand-navy">Subscription</span>
                    </button>
                </div>

                <!-- Settings Group: Personal Info -->
                <div class="mb-6">
                    <h3 class="text-[13px] font-bold text-brand-navy/50 uppercase tracking-wider mb-3 px-1">Account Settings</h3>
                    <div class="bg-white rounded-[20px] shadow-[0_2px_12px_rgba(20,34,58,0.04)] border border-brand-navy/5 overflow-hidden">
                        
                        <!-- Personal Details -->
                        <button class="w-full flex items-center justify-between p-4 border-b border-brand-navy/5 hover:bg-brand-navy/5 transition-colors text-left">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-brand-navy/5 flex items-center justify-center text-brand-navy shrink-0">
                                    <i class="fa-regular fa-user text-[14px]"></i>
                                </div>
                                <span class="text-[15px] font-medium text-brand-navy">Personal Details</span>
                            </div>
                            <i class="fa-solid fa-chevron-right text-[12px] text-brand-navy/30"></i>
                        </button>

                        <!-- Biometrics Toggle -->
                        <div class="w-full flex items-center justify-between p-4 border-b border-brand-navy/5">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-brand-navy/5 flex items-center justify-center text-brand-navy shrink-0">
                                    <i class="fa-solid fa-fingerprint text-[14px]"></i>
                                </div>
                                <div>
                                    <span class="text-[15px] font-medium text-brand-navy block">Biometric Login</span>
                                    <span class="text-[12px] text-brand-navy/50">Face ID / Touch ID</span>
                                </div>
                            </div>
                            <!-- Toggle -->
                            <div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
                                <input type="checkbox" name="toggle" id="biometrics-toggle" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 border-brand-navy/10 appearance-none cursor-pointer transition-all duration-300 z-10 top-0 left-0" checked/>
                                <label for="biometrics-toggle" class="toggle-label block overflow-hidden h-6 rounded-full bg-brand-navy/20 cursor-pointer transition-colors duration-300"></label>
                            </div>
                        </div>

                        <!-- Language -->
                        <button class="w-full flex items-center justify-between p-4 hover:bg-brand-navy/5 transition-colors text-left">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-brand-navy/5 flex items-center justify-center text-brand-navy shrink-0">
                                    <i class="fa-solid fa-globe text-[14px]"></i>
                                </div>
                                <span class="text-[15px] font-medium text-brand-navy">Language</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="text-[14px] font-medium text-brand-navy/60">English</span>
                                <i class="fa-solid fa-chevron-right text-[12px] text-brand-navy/30"></i>
                            </div>
                        </button>
                    </div>
                </div>

                <!-- Settings Group: Support & Legal -->
                <div class="mb-6">
                    <h3 class="text-[13px] font-bold text-brand-navy/50 uppercase tracking-wider mb-3 px-1">Support & Legal</h3>
                    <div class="bg-white rounded-[20px] shadow-[0_2px_12px_rgba(20,34,58,0.04)] border border-brand-navy/5 overflow-hidden">
                        
                        <button class="w-full flex items-center justify-between p-4 border-b border-brand-navy/5 hover:bg-brand-navy/5 transition-colors text-left">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-brand-navy/5 flex items-center justify-center text-brand-navy shrink-0">
                                    <i class="fa-regular fa-circle-question text-[14px]"></i>
                                </div>
                                <span class="text-[15px] font-medium text-brand-navy">Help & Support</span>
                            </div>
                            <i class="fa-solid fa-chevron-right text-[12px] text-brand-navy/30"></i>
                        </button>

                        <button class="w-full flex items-center justify-between p-4 border-b border-brand-navy/5 hover:bg-brand-navy/5 transition-colors text-left">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-brand-navy/5 flex items-center justify-center text-brand-navy shrink-0">
                                    <i class="fa-regular fa-comment-dots text-[14px]"></i>
                                </div>
                                <span class="text-[15px] font-medium text-brand-navy">Provide Feedback</span>
                            </div>
                            <i class="fa-solid fa-chevron-right text-[12px] text-brand-navy/30"></i>
                        </button>

                        <button class="w-full flex items-center justify-between p-4 hover:bg-brand-navy/5 transition-colors text-left">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-brand-navy/5 flex items-center justify-center text-brand-navy shrink-0">
                                    <i class="fa-solid fa-shield-halved text-[14px]"></i>
                                </div>
                                <span class="text-[15px] font-medium text-brand-navy">Privacy Policy</span>
                            </div>
                            <i class="fa-solid fa-chevron-right text-[12px] text-brand-navy/30"></i>
                        </button>
                    </div>
                </div>

                <!-- Danger Zone -->
                <div class="mb-8">
                    <button class="w-full flex items-center justify-center gap-2 p-4 bg-white rounded-[16px] shadow-[0_2px_12px_rgba(20,34,58,0.04)] border border-brand-danger/20 text-brand-danger font-bold hover:bg-brand-danger/5 transition-colors mb-4">
                        <i class="fa-solid fa-arrow-right-from-bracket text-[16px]"></i> Log Out
                    </button>
                    
                    <button class="w-full flex items-center justify-center gap-2 p-4 text-brand-danger/70 font-medium text-[14px] hover:text-brand-danger transition-colors">
                        <i class="fa-solid fa-trash-can text-[14px]"></i> Delete Account
                    </button>
                </div>

            </div>
        </div>

        <!-- BOTTOM UI: Navigation (Preserved exactly from context, Profile Active) -->
        <div class="absolute bottom-0 left-0 w-full z-50 flex flex-col pointer-events-none">
            <!-- Bottom Navigation Bar -->
            <div class="bg-white rounded-t-[24px] shadow-[0_-4px_20px_rgba(0,0,0,0.05)] px-6 py-4 pb-8 flex items-center justify-between relative z-50 text-brand-navy border-t border-brand-navy/5 pointer-events-auto">
                
                <!-- Home Map -->
                <button class="flex flex-col items-center gap-1 text-gray-400 hover:text-brand-navy transition-colors">
                    <div class="w-12 h-8 flex items-center justify-center">
                        <i class="fa-solid fa-map text-[18px]"></i>
                    </div>
                    <span class="text-[10px] font-medium">Map</span>
                </button>

                <!-- Search/Filters -->
                <button class="flex flex-col items-center gap-1 text-gray-400 hover:text-brand-navy transition-colors">
                    <div class="w-12 h-8 flex items-center justify-center">
                        <i class="fa-solid fa-magnifying-glass text-[18px]"></i>
                    </div>
                    <span class="text-[10px] font-medium">Search</span>
                </button>

                <!-- Scanner -->
                <button class="flex flex-col items-center gap-1 text-brand-navy relative -top-6">
                    <div class="w-14 h-14 bg-brand-navy rounded-full flex items-center justify-center text-white shadow-[0_8px_16px_rgba(20,34,58,0.3)] border-4 border-white">
                        <i class="fa-solid fa-camera text-[22px]"></i>
                    </div>
                    <span class="text-[10px] font-bold mt-1">Scan</span>
                </button>

                <!-- Bookings History -->
                <button class="flex flex-col items-center gap-1 text-gray-400 hover:text-brand-navy transition-colors">
                    <div class="w-12 h-8 flex items-center justify-center relative">
                        <i class="fa-solid fa-clock-rotate-left text-[18px]"></i>
                    </div>
                    <span class="text-[10px] font-medium">History</span>
                </button>

                <!-- Side Menu (Profile Active) -->
                <button class="flex flex-col items-center gap-1 text-brand-navy transition-colors">
                    <div class="w-12 h-8 flex items-center justify-center relative">
                        <i class="fa-solid fa-bars text-[18px]"></i>
                    </div>
                    <span class="text-[10px] font-bold">Menu</span>
                </button>
            </div>
        </div>

    </div>


<script defer src="/prototype-bridge.js"></script>
</body>
</html>
