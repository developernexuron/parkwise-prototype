<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ParkWise - Scanner (Camera)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            navy: '#14223A',
                            gold: '#E6A129',
                            success: '#28A745',
                            danger: '#DC3545',
                            gray: '#1C1C1E',
                            lightGray: '#2C2C2E',
                            muted: '#8E8E93',
                            swish: '#FFD100', // Swish yellow
                            swishBlue: '#005596', // Swish blue
                        }
                    },
                    backgroundImage: {
                        'radial-gradient': 'radial-gradient(circle at center, #1E3354 0%, #14223A 100%)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #14223A;
            color: #FFFFFF;
            overflow: hidden;
        }
        
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Scanner Animation */
        @keyframes scanline {
            0% {
                top: 0;
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                top: 100%;
                opacity: 0;
            }
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: #28A745;
            box-shadow: 0 0 8px #28A745;
            animation: scanline 2.5s infinite linear;
        }

        /* Scanner Brackets */
        .bracket {
            position: absolute;
            width: 40px;
            height: 40px;
            border-color: #FFFFFF;
            border-style: solid;
        }
        .bracket-tl { top: 0; left: 0; border-width: 4px 0 0 4px; border-top-left-radius: 16px; }
        .bracket-tr { top: 0; right: 0; border-width: 4px 4px 0 0; border-top-right-radius: 16px; }
        .bracket-bl { bottom: 0; left: 0; border-width: 0 0 4px 4px; border-bottom-left-radius: 16px; }
        .bracket-br { bottom: 0; right: 0; border-width: 0 4px 4px 0; border-bottom-right-radius: 16px; }

        /* Camera Overlay Mask */
        .camera-mask {
            box-shadow: 0 0 0 9999px rgba(20, 34, 58, 0.85);
        }
    </style>
</head>
<body class="bg-radial-gradient min-h-[100dvh] flex flex-col items-center justify-center relative m-0 p-0" data-pw-screen="scanner-camera">

    <!-- Mobile Container Wrapper -->
    <div id="app-container" class="w-full max-w-[375px] h-[100dvh] mx-auto relative flex flex-col px-0 pt-0 z-10 bg-brand-navy text-white rounded-none sm:rounded-[40px] sm:h-[812px] sm:my-8 overflow-hidden shadow-2xl">
        
        <!-- Simulated Camera Feed Background -->
        <div class="absolute inset-0 z-0">
            <img src="https://storage.googleapis.com/uxpilot-auth.appspot.com/e9943fac0f-bd060e9539ba2e90f1c2.png" alt="Parking Sign Camera Feed" class="w-full h-full object-cover opacity-60">
        </div>

        <!-- Header / Controls over Camera -->
        <div class="px-6 pt-12 pb-4 z-30 relative flex items-center justify-between">
            <button class="w-10 h-10 rounded-full bg-brand-navy/50 backdrop-blur-md flex items-center justify-center text-white hover:bg-brand-navy/70 transition-colors border border-white/10">
                <i class="fa-solid fa-arrow-left text-[16px]"></i>
            </button>
            <div class="flex items-center gap-3">
                <button class="w-10 h-10 rounded-full bg-brand-navy/50 backdrop-blur-md flex items-center justify-center text-white hover:bg-brand-navy/70 transition-colors border border-white/10" id="torch-toggle">
                    <i class="fa-solid fa-bolt text-[16px]"></i>
                </button>
                <button class="w-10 h-10 rounded-full bg-brand-navy/50 backdrop-blur-md flex items-center justify-center text-white hover:bg-brand-navy/70 transition-colors border border-white/10">
                    <i class="fa-regular fa-circle-question text-[16px]"></i>
                </button>
            </div>
        </div>

        <!-- Main Scanner Area -->
        <div class="flex-1 relative z-20 flex flex-col items-center justify-center px-6">
            
            <!-- Guidance Tooltip Above -->
            <div class="bg-brand-navy/80 backdrop-blur-md border border-white/10 rounded-[16px] py-3 px-5 mb-8 text-center max-w-[280px]">
                <p class="text-[14px] font-medium text-white">Position the parking sign within the frame to scan</p>
            </div>

            <!-- Viewfinder / Scan Zone -->
            <div class="relative w-[280px] h-[380px] rounded-[16px] camera-mask">
                <!-- Brackets -->
                <div class="bracket bracket-tl"></div>
                <div class="bracket bracket-tr"></div>
                <div class="bracket bracket-bl"></div>
                <div class="bracket bracket-br"></div>
                
                <!-- Animated Scan Line -->
                <div class="scan-line"></div>
                
                <!-- Inner clear area (handled by mask shadow) -->
                <div class="absolute inset-0 rounded-[16px] border border-white/20"></div>
            </div>

            <!-- Manual Entry Fallback Below -->
            <div class="mt-12 w-full flex flex-col items-center gap-4">
                <div class="flex items-center gap-4 w-full max-w-[280px]">
                    <div class="h-[1px] flex-1 bg-white/20"></div>
                    <span class="text-[12px] text-white/60 font-medium uppercase tracking-wider">Having trouble?</span>
                    <div class="h-[1px] flex-1 bg-white/20"></div>
                </div>
                
                <button class="w-[280px] h-12 rounded-[12px] bg-white text-brand-navy font-bold text-[15px] flex items-center justify-center gap-2 hover:bg-gray-100 transition-colors shadow-lg">
                    <i class="fa-solid fa-keyboard"></i>
                    Enter Sign Code Manually
                </button>
            </div>

        </div>

        <!-- BOTTOM UI: Navigation (Preserved from context) -->
        <div class="absolute bottom-0 left-0 w-full z-50 flex flex-col">
            <!-- Bottom Navigation Bar -->
            <div class="bg-white rounded-t-[24px] shadow-[0_-4px_20px_rgba(0,0,0,0.05)] px-6 py-4 pb-8 flex items-center justify-between relative z-50">
                
                <!-- Home Map -->
                <button class="flex flex-col items-center gap-1 text-gray-400 hover:text-brand-navy transition-colors">
                    <div class="w-12 h-8 flex items-center justify-center">
                        <i class="fa-solid fa-map text-[18px]"></i>
                    </div>
                    <span class="text-[10px] font-medium">Map</span>
                </button>

                <!-- Search/Filters -->
                <button class="flex flex-col items-center gap-1 text-gray-400 hover:text-brand-navy transition-colors">
                    <div class="w-12 h-8 flex items-center justify-center">
                        <i class="fa-solid fa-magnifying-glass text-[18px]"></i>
                    </div>
                    <span class="text-[10px] font-medium">Search</span>
                </button>

                <!-- Scanner (Active) -->
                <button class="flex flex-col items-center gap-1 text-brand-navy relative -top-6">
                    <div class="w-14 h-14 bg-brand-navy rounded-full flex items-center justify-center text-white shadow-[0_8px_16px_rgba(20,34,58,0.3)] border-4 border-white">
                        <i class="fa-solid fa-camera text-[22px]"></i>
                    </div>
                    <span class="text-[10px] font-bold mt-1">Scan</span>
                </button>

                <!-- Bookings History -->
                <button class="flex flex-col items-center gap-1 text-gray-400 hover:text-brand-navy transition-colors">
                    <div class="w-12 h-8 flex items-center justify-center relative">
                        <i class="fa-solid fa-clock-rotate-left text-[18px]"></i>
                    </div>
                    <span class="text-[10px] font-medium">Activity</span>
                </button>

                <!-- Side Menu -->
                <button class="flex flex-col items-center gap-1 text-gray-400 hover:text-brand-navy transition-colors">
                    <div class="w-12 h-8 flex items-center justify-center">
                        <i class="fa-solid fa-bars text-[18px]"></i>
                    </div>
                    <span class="text-[10px] font-medium">Menu</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Torch toggle interaction
        const torchBtn = document.getElementById('torch-toggle');
        let torchActive = false;
        
        torchBtn.addEventListener('click', () => {
            torchActive = !torchActive;
            if (torchActive) {
                torchBtn.classList.remove('bg-brand-navy/50', 'text-white');
                torchBtn.classList.add('bg-brand-gold', 'text-brand-navy', 'border-brand-gold');
                torchBtn.innerHTML = '<i class="fa-solid fa-bolt text-[16px]"></i>';
            } else {
                torchBtn.classList.add('bg-brand-navy/50', 'text-white');
                torchBtn.classList.remove('bg-brand-gold', 'text-brand-navy', 'border-brand-gold');
            }
        });
    </script>

<script defer src="/prototype-bridge.js"></script>
</body>
</html>
