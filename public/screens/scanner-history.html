<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ParkWise - Scanner History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            navy: '#14223A',
                            gold: '#E6A129',
                            success: '#28A745',
                            danger: '#DC3545',
                            gray: '#1C1C1E',
                            lightGray: '#2C2C2E',
                            muted: '#8E8E93',
                            swish: '#FFD100', // Swish yellow
                            swishBlue: '#005596', // Swish blue
                        }
                    },
                    backgroundImage: {
                        'radial-gradient': 'radial-gradient(circle at center, #1E3354 0%, #14223A 100%)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #14223A;
            color: #FFFFFF;
            overflow: hidden;
        }
        
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-radial-gradient min-h-[100dvh] flex flex-col items-center justify-center relative m-0 p-0" data-pw-screen="scanner-history">

    <!-- Mobile Container Wrapper -->
    <div id="app-container" class="w-full max-w-[375px] h-[100dvh] mx-auto relative flex flex-col px-0 pt-0 z-10 bg-brand-navy text-white rounded-none sm:rounded-[40px] sm:h-[812px] sm:my-8 overflow-hidden shadow-2xl">
        
        <!-- Header -->
        <div class="px-6 pt-12 pb-4 z-30 relative flex flex-col gap-4 bg-brand-navy shadow-sm">
            <div class="flex items-center justify-between">
                <button class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-white hover:bg-white/10 transition-colors border border-white/10">
                    <i class="fa-solid fa-chevron-left text-[16px]"></i>
                </button>
                <h1 class="text-[18px] font-semibold tracking-wide">Scan History</h1>
                <button class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-white hover:bg-white/10 transition-colors border border-white/10">
                    <i class="fa-solid fa-trash-can text-[14px]"></i>
                </button>
            </div>

            <!-- Search & Filter Bar -->
            <div class="flex gap-2">
                <div class="relative flex-1">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-brand-muted text-[14px]"></i>
                    <input type="text" placeholder="Search locations..." class="w-full bg-white/5 border border-white/10 rounded-[12px] py-3 pl-10 pr-4 text-[14px] text-white placeholder:text-brand-muted focus:outline-none focus:border-brand-gold/50 transition-colors">
                </div>
                <button class="w-12 h-12 bg-white/5 border border-white/10 rounded-[12px] flex items-center justify-center text-brand-gold hover:bg-white/10 transition-colors">
                    <i class="fa-solid fa-sliders text-[16px]"></i>
                </button>
            </div>

            <!-- Tabs -->
            <div class="flex gap-4 border-b border-white/10">
                <button class="pb-2 px-2 text-[14px] font-medium text-brand-gold border-b-2 border-brand-gold">All Scans</button>
                <button class="pb-2 px-2 text-[14px] font-medium text-brand-muted hover:text-white transition-colors">Favorites</button>
            </div>
        </div>

        <!-- Scrollable Content Area -->
        <div class="flex-1 relative z-20 overflow-y-auto hide-scrollbar px-6 py-6 pb-32">
            
            <!-- History List -->
            <div class="flex flex-col gap-4">
                
                <!-- History Item 1 -->
                <div class="bg-white rounded-[20px] p-5 shadow-lg text-brand-navy relative overflow-hidden group">
                    <div class="flex items-start justify-between mb-3">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-[10px] bg-brand-navy/5 flex items-center justify-center border border-brand-navy/10 shrink-0">
                                <i class="fa-solid fa-square-parking text-[20px] text-brand-navy"></i>
                            </div>
                            <div>
                                <h3 class="text-[16px] font-bold leading-tight">Sveavägen 44</h3>
                                <p class="text-[12px] text-brand-muted font-medium mt-0.5">Today, 14:30</p>
                            </div>
                        </div>
                        <div class="bg-brand-success/10 text-brand-success px-2.5 py-1 rounded-full flex items-center gap-1 border border-brand-success/20">
                            <i class="fa-solid fa-check text-[10px]"></i>
                            <span class="text-[11px] font-bold">Valid</span>
                        </div>
                    </div>
                    
                    <div class="flex items-center justify-between mt-4 pt-4 border-t border-gray-100">
                        <div class="text-[13px] text-brand-navy font-medium">Paid Zone 3 • 30 SEK/hr</div>
                        <button class="text-brand-gold font-semibold text-[13px] flex items-center gap-1.5 hover:opacity-80 transition-opacity">
                            Reopen <i class="fa-solid fa-arrow-right text-[12px]"></i>
                        </button>
                    </div>

                    <!-- Swipe Actions Overlay (Hidden by default, shown for structure) -->
                    <div class="absolute inset-y-0 right-0 w-20 bg-brand-danger flex items-center justify-center translate-x-full group-hover:translate-x-0 transition-transform duration-300 rounded-r-[20px]">
                        <i class="fa-solid fa-trash-can text-white text-[18px]"></i>
                    </div>
                </div>

                <!-- History Item 2 -->
                <div class="bg-white rounded-[20px] p-5 shadow-lg text-brand-navy relative overflow-hidden">
                    <div class="flex items-start justify-between mb-3">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-[10px] bg-brand-danger/5 flex items-center justify-center border border-brand-danger/10 shrink-0">
                                <i class="fa-solid fa-ban text-[20px] text-brand-danger"></i>
                            </div>
                            <div>
                                <h3 class="text-[16px] font-bold leading-tight">Kungsgatan 12</h3>
                                <p class="text-[12px] text-brand-muted font-medium mt-0.5">Yesterday, 09:15</p>
                            </div>
                        </div>
                        <div class="bg-brand-danger/10 text-brand-danger px-2.5 py-1 rounded-full flex items-center gap-1 border border-brand-danger/20">
                            <i class="fa-solid fa-xmark text-[10px]"></i>
                            <span class="text-[11px] font-bold">Restricted</span>
                        </div>
                    </div>
                    
                    <div class="flex items-center justify-between mt-4 pt-4 border-t border-gray-100">
                        <div class="text-[13px] text-brand-danger font-medium flex items-center gap-1.5">
                            <i class="fa-solid fa-broom"></i> Street Cleaning
                        </div>
                        <button class="text-brand-gold font-semibold text-[13px] flex items-center gap-1.5 hover:opacity-80 transition-opacity">
                            Reopen <i class="fa-solid fa-arrow-right text-[12px]"></i>
                        </button>
                    </div>
                </div>

                <!-- History Item 3 -->
                <div class="bg-white rounded-[20px] p-5 shadow-lg text-brand-navy relative overflow-hidden">
                    <div class="flex items-start justify-between mb-3">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-[10px] bg-brand-gold/5 flex items-center justify-center border border-brand-gold/10 shrink-0">
                                <i class="fa-solid fa-bolt text-[20px] text-brand-gold"></i>
                            </div>
                            <div>
                                <h3 class="text-[16px] font-bold leading-tight">Odenplan 2</h3>
                                <p class="text-[12px] text-brand-muted font-medium mt-0.5">Oct 24, 18:45</p>
                            </div>
                        </div>
                        <div class="bg-brand-success/10 text-brand-success px-2.5 py-1 rounded-full flex items-center gap-1 border border-brand-success/20">
                            <i class="fa-solid fa-check text-[10px]"></i>
                            <span class="text-[11px] font-bold">Valid</span>
                        </div>
                    </div>
                    
                    <div class="flex items-center justify-between mt-4 pt-4 border-t border-gray-100">
                        <div class="text-[13px] text-brand-navy font-medium">EV Charging Only • Max 4hr</div>
                        <button class="text-brand-gold font-semibold text-[13px] flex items-center gap-1.5 hover:opacity-80 transition-opacity">
                            Reopen <i class="fa-solid fa-arrow-right text-[12px]"></i>
                        </button>
                    </div>
                </div>

            </div>

            <!-- Empty State (Hidden, but included for structure) -->
            <div class="hidden flex-col items-center justify-center text-center mt-20 px-4">
                <div class="w-24 h-24 bg-white/5 rounded-full flex items-center justify-center mb-6 border border-white/10">
                    <i class="fa-solid fa-camera-retro text-[32px] text-brand-muted"></i>
                </div>
                <h2 class="text-[20px] font-bold mb-2">No Scans Yet</h2>
                <p class="text-[14px] text-brand-muted mb-8 leading-relaxed">
                    Scan parking signs to instantly understand rules and save them to your history.
                </p>
                <button class="w-full bg-brand-gold text-brand-navy font-bold rounded-[16px] py-4 shadow-[0_8px_16px_rgba(230,161,41,0.2)] hover:bg-brand-gold/90 transition-colors">
                    Scan a Sign Now
                </button>
            </div>

        </div>

        <!-- BOTTOM UI: Navigation (Preserved from context) -->
        <div class="absolute bottom-0 left-0 w-full z-50 flex flex-col">
            <!-- Bottom Navigation Bar -->
            <div class="bg-white rounded-t-[24px] shadow-[0_-4px_20px_rgba(0,0,0,0.05)] px-6 py-4 pb-8 flex items-center justify-between relative z-50 text-brand-navy">
                
                <!-- Home Map -->
                <button class="flex flex-col items-center gap-1 text-gray-400 hover:text-brand-navy transition-colors">
                    <div class="w-12 h-8 flex items-center justify-center">
                        <i class="fa-solid fa-map text-[18px]"></i>
                    </div>
                    <span class="text-[10px] font-medium">Map</span>
                </button>

                <!-- Search/Filters -->
                <button class="flex flex-col items-center gap-1 text-gray-400 hover:text-brand-navy transition-colors">
                    <div class="w-12 h-8 flex items-center justify-center">
                        <i class="fa-solid fa-magnifying-glass text-[18px]"></i>
                    </div>
                    <span class="text-[10px] font-medium">Search</span>
                </button>

                <!-- Scanner -->
                <button class="flex flex-col items-center gap-1 text-brand-navy relative -top-6">
                    <div class="w-14 h-14 bg-brand-navy rounded-full flex items-center justify-center text-white shadow-[0_8px_16px_rgba(20,34,58,0.3)] border-4 border-white">
                        <i class="fa-solid fa-camera text-[22px]"></i>
                    </div>
                    <span class="text-[10px] font-bold mt-1">Scan</span>
                </button>

                <!-- Bookings History (Active) -->
                <button class="flex flex-col items-center gap-1 text-brand-navy transition-colors">
                    <div class="w-12 h-8 flex items-center justify-center relative">
                        <i class="fa-solid fa-clock-rotate-left text-[18px]"></i>
                    </div>
                    <span class="text-[10px] font-bold">History</span>
                </button>

                <!-- Profile -->
                <button class="flex flex-col items-center gap-1 text-gray-400 hover:text-brand-navy transition-colors">
                    <div class="w-12 h-8 flex items-center justify-center">
                        <i class="fa-regular fa-user text-[18px]"></i>
                    </div>
                    <span class="text-[10px] font-medium">Profile</span>
                </button>
            </div>
        </div>
    </div>


<script defer src="/prototype-bridge.js"></script>
</body>
</html>
