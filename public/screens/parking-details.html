<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ParkWise - Parking Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            navy: '#14223A',
                            gold: '#E6A129',
                            success: '#28A745',
                            danger: '#DC3545',
                            gray: '#1C1C1E',
                            lightGray: '#2C2C2E',
                            muted: '#8E8E93'
                        }
                    },
                    backgroundImage: {
                        'radial-gradient': 'radial-gradient(circle at center, #1E3354 0%, #14223A 100%)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #14223A;
            color: #FFFFFF;
            overflow: hidden;
        }
        
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Map background pattern */
        .map-bg {
            background-color: #f0f3f5;
            background-image: radial-gradient(#d1d5db 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        /* Bottom Sheet Animation */
        .sheet-enter {
            transform: translateY(100%);
        }
        .sheet-enter-active {
            transform: translateY(0);
            transition: transform 300ms cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="bg-radial-gradient min-h-[100dvh] flex flex-col items-center justify-center relative m-0 p-0" data-pw-screen="parking-details">

    <!-- Mobile Container Wrapper -->
    <div id="app-container" class="w-full max-w-[375px] h-[100dvh] mx-auto relative flex flex-col px-0 pt-0 z-10 bg-white text-brand-navy rounded-none sm:rounded-[40px] sm:h-[812px] sm:my-8 overflow-hidden shadow-2xl">
        
        <!-- MAP LAYER (Background) -->
        <div id="map-layer" class="absolute inset-0 z-0 map-bg">
            <img class="w-full h-full object-cover" src="https://storage.googleapis.com/uxpilot-auth.appspot.com/9540a71a7c-474a3b46ff7ab52ba8bc.png" alt="Map background" />
            
            <!-- Map Markers -->
            <div class="absolute top-[40%] left-[30%] w-10 h-10 -ml-5 -mt-10 flex flex-col items-center">
                <div class="w-8 h-8 bg-brand-gold rounded-full flex items-center justify-center text-white shadow-lg border-2 border-white z-10">
                    <i class="fa-solid fa-parking text-[14px]"></i>
                </div>
                <div class="w-2 h-2 bg-brand-gold rotate-45 -mt-1 shadow-sm"></div>
            </div>
            
            <div class="absolute top-[55%] left-[65%] w-12 h-12 -ml-6 -mt-12 flex flex-col items-center z-20">
                <div class="w-10 h-10 bg-[#28A745] rounded-full flex items-center justify-center text-white shadow-xl border-2 border-white transform scale-110">
                    <i class="fa-solid fa-parking text-[18px]"></i>
                </div>
                <div class="w-3 h-3 bg-[#28A745] rotate-45 -mt-1.5 shadow-md"></div>
            </div>
            
            <!-- Map Controls -->
            <div class="absolute top-12 right-4 flex flex-col gap-3 z-10">
                <button class="w-10 h-10 bg-white rounded-full shadow-md flex items-center justify-center text-brand-navy hover:bg-gray-50">
                    <i class="fa-solid fa-layer-group text-[16px]"></i>
                </button>
                <button class="w-10 h-10 bg-white rounded-full shadow-md flex items-center justify-center text-brand-navy hover:bg-gray-50">
                    <i class="fa-solid fa-location-crosshairs text-[16px]"></i>
                </button>
            </div>
            
            <!-- Back Button -->
            <button class="absolute top-12 left-4 w-10 h-10 bg-white rounded-full shadow-md flex items-center justify-center text-brand-navy hover:bg-gray-50 z-10">
                <i class="fa-solid fa-arrow-left text-[16px]"></i>
            </button>
        </div>

        <!-- DARK OVERLAY (Behind Sheet) -->
        <div class="absolute inset-0 bg-brand-navy/20 z-10 pointer-events-none"></div>

        <!-- PARKING DETAILS BOTTOM SHEET -->
        <div class="absolute bottom-[80px] left-0 w-full bg-white rounded-t-[32px] shadow-[0_-8px_30px_rgba(0,0,0,0.12)] z-20 flex flex-col max-h-[85vh] sheet-enter-active">
            
            <!-- Drag Handle -->
            <div class="w-full pt-3 pb-2 flex justify-center shrink-0">
                <div class="w-12 h-1.5 bg-gray-200 rounded-full"></div>
            </div>

            <div class="flex-1 overflow-y-auto hide-scrollbar px-6 pb-6">
                
                <!-- Header Info -->
                <div class="flex justify-between items-start mb-5 pt-2">
                    <div>
                        <div class="flex items-center gap-2 mb-1">
                            <span class="px-2.5 py-1 bg-[#28A745]/10 text-[#28A745] rounded-md text-[11px] font-bold uppercase tracking-wide">Free Parking</span>
                            <span class="px-2.5 py-1 bg-gray-100 text-gray-600 rounded-md text-[11px] font-bold uppercase tracking-wide">Street</span>
                        </div>
                        <h2 class="text-[22px] font-bold text-brand-navy leading-tight">Kungsgatan 12</h2>
                        <p class="text-[13px] text-gray-500 mt-1">Norrmalm, Stockholm</p>
                    </div>
                    <button class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 hover:text-brand-gold hover:bg-brand-gold/10 transition-colors">
                        <i class="fa-regular fa-bookmark text-[18px]"></i>
                    </button>
                </div>

                <!-- Status Chips Grid -->
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <div class="bg-gray-50 rounded-2xl p-3 flex flex-col gap-1 border border-gray-100">
                        <div class="flex items-center gap-2 text-[#28A745]">
                            <i class="fa-solid fa-circle-check text-[14px]"></i>
                            <span class="text-[12px] font-bold">High Chance</span>
                        </div>
                        <span class="text-[11px] text-gray-500">Availability Confidence</span>
                    </div>
                    
                    <div class="bg-brand-gold/10 rounded-2xl p-3 flex flex-col gap-1 border border-brand-gold/20">
                        <div class="flex items-center gap-2 text-brand-gold">
                            <i class="fa-solid fa-broom text-[14px]"></i>
                            <span class="text-[12px] font-bold">Tomorrow</span>
                        </div>
                        <span class="text-[11px] text-gray-500">Street Cleaning 08:00</span>
                    </div>
                </div>

                <!-- Pricing & Rules Card -->
                <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-4 mb-6">
                    <div class="flex items-end justify-between mb-4 pb-4 border-b border-gray-50">
                        <div>
                            <span class="text-[12px] font-medium text-gray-500 block mb-1">Price / Hour</span>
                            <div class="flex items-baseline gap-1">
                                <span class="text-[28px] font-bold text-brand-navy">0</span>
                                <span class="text-[14px] font-medium text-gray-500">kr</span>
                            </div>
                        </div>
                        <div class="text-right">
                            <span class="text-[12px] font-medium text-gray-500 block mb-1">Max Duration</span>
                            <span class="text-[16px] font-bold text-brand-navy">2 Hours</span>
                        </div>
                    </div>
                    
                    <div class="space-y-3">
                        <h3 class="text-[13px] font-bold text-brand-navy uppercase tracking-wide">Rules Summary</h3>
                        
                        <div class="flex items-start gap-3">
                            <div class="w-6 h-6 rounded-full bg-gray-50 flex items-center justify-center text-gray-500 shrink-0 mt-0.5">
                                <i class="fa-regular fa-clock text-[12px]"></i>
                            </div>
                            <div>
                                <span class="text-[13px] font-medium text-brand-navy block">Free 09:00 - 17:00</span>
                                <span class="text-[12px] text-gray-500">Weekdays only</span>
                            </div>
                        </div>
                        
                        <div class="flex items-start gap-3">
                            <div class="w-6 h-6 rounded-full bg-gray-50 flex items-center justify-center text-gray-500 shrink-0 mt-0.5">
                                <i class="fa-solid fa-triangle-exclamation text-[12px]"></i>
                            </div>
                            <div>
                                <span class="text-[13px] font-medium text-brand-navy block">P-skiva Required</span>
                                <span class="text-[12px] text-gray-500">Display parking disc visibly</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="flex gap-3 mt-4">
                    <button class="flex-1 h-14 bg-gray-100 text-brand-navy rounded-full font-semibold text-[15px] flex items-center justify-center gap-2 hover:bg-gray-200 transition-colors">
                        <i class="fa-solid fa-directions"></i>
                        Directions
                    </button>
                    <button class="flex-[1.5] h-14 bg-brand-navy text-white rounded-full font-semibold text-[15px] shadow-[0_8px_20px_rgba(20,34,58,0.2)] flex items-center justify-center gap-2 hover:bg-[#1E3354] transition-colors">
                        <i class="fa-solid fa-ticket"></i>
                        Start Parking
                    </button>
                </div>
                
            </div>
        </div>

        <!-- BOTTOM UI: Navigation -->
        <div class="absolute bottom-0 left-0 w-full z-40 flex flex-col">
            <!-- Bottom Navigation Bar -->
            <div class="bg-white rounded-t-[24px] shadow-[0_-4px_20px_rgba(0,0,0,0.05)] px-6 py-4 pb-8 flex items-center justify-between relative z-40">
                
                <!-- Home Map (Active) -->
                <button class="flex flex-col items-center gap-1 text-brand-navy">
                    <div class="w-12 h-8 bg-gray-100 rounded-full flex items-center justify-center">
                        <i class="fa-solid fa-map text-[18px]"></i>
                    </div>
                    <span class="text-[10px] font-bold">Map</span>
                </button>

                <!-- Search/Filters -->
                <button class="flex flex-col items-center gap-1 text-gray-400 hover:text-brand-navy transition-colors">
                    <div class="w-12 h-8 flex items-center justify-center">
                        <i class="fa-solid fa-magnifying-glass text-[18px]"></i>
                    </div>
                    <span class="text-[10px] font-medium">Search</span>
                </button>

                <!-- Bookings History -->
                <button class="flex flex-col items-center gap-1 text-gray-400 hover:text-brand-navy transition-colors">
                    <div class="w-12 h-8 flex items-center justify-center relative">
                        <i class="fa-solid fa-clock-rotate-left text-[18px]"></i>
                    </div>
                    <span class="text-[10px] font-medium">Activity</span>
                </button>

                <!-- Profile -->
                <button class="flex flex-col items-center gap-1 text-gray-400 hover:text-brand-navy transition-colors">
                    <div class="w-12 h-8 flex items-center justify-center">
                        <i class="fa-regular fa-user text-[18px]"></i>
                    </div>
                    <span class="text-[10px] font-medium">Profile</span>
                </button>
            </div>
        </div>
    </div>


<script defer src="/prototype-bridge.js"></script>
</body>
</html>
