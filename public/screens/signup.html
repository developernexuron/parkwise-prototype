<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ParkWise - Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            navy: '#14223A',
                            gold: '#E6A129',
                            success: '#28A745',
                            danger: '#DC3545',
                        }
                    },
                    backgroundImage: {
                        'radial-gradient': 'radial-gradient(circle at center, #1E3354 0%, #14223A 100%)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #14223A;
            color: #FFFFFF;
            overflow: hidden;
        }
        
        /* Fade in animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }

        /* Custom Checkbox Styling */
        .custom-checkbox {
            appearance: none;
            width: 1.25rem;
            height: 1.25rem;
            border: 2px solid #E5E7EB;
            border-radius: 4px;
            background-color: white;
            position: relative;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .custom-checkbox:checked {
            background-color: #14223A;
            border-color: #14223A;
        }
        .custom-checkbox:checked::after {
            content: '\f00c';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            color: white;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.75rem;
        }
    </style>
</head>
<body class="bg-radial-gradient min-h-[100dvh] flex flex-col items-center justify-center relative m-0 p-0" data-pw-screen="signup">

    <!-- Mobile Container Wrapper -->
    <div id="app-container" class="w-full max-w-[375px] h-[100dvh] mx-auto relative flex flex-col justify-between px-6 py-10 z-10 bg-white text-brand-navy rounded-none sm:rounded-[40px] sm:h-[812px] sm:my-8 overflow-hidden shadow-2xl">
        
        <!-- Header (Back) -->
        <div id="auth-header" class="flex justify-between items-center w-full pt-2 z-20 shrink-0">
            <!-- Back Button -->
            <button class="text-sm font-semibold text-gray-400 hover:text-brand-navy transition-colors px-2 py-1 flex items-center gap-1">
                <i class="fa-solid fa-chevron-left text-xs"></i> Back
            </button>
        </div>

        <!-- Main Content Area -->
        <div class="flex-1 flex flex-col mt-6 z-10 animate-fade-in relative overflow-y-auto pb-4" style="scrollbar-width: none;">
            
            <!-- Typography & Copy -->
            <div class="px-2 mb-8 text-center">
                <div class="w-16 h-16 bg-brand-gold/10 rounded-[20px] flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-user-plus text-brand-gold text-2xl"></i>
                </div>
                <h1 class="text-[28px] leading-[1.2] font-bold text-brand-navy mb-2 tracking-tight">
                    Create Account
                </h1>
                <p class="text-[15px] text-gray-500 font-medium leading-relaxed">
                    Join ParkWise to find and manage parking in Stockholm.
                </p>
            </div>

            <!-- Registration Form -->
            <form id="registration-form" class="space-y-5 px-2 mb-6">
                
                <!-- Full Name -->
                <div class="space-y-1.5">
                    <label for="fullName" class="text-[13px] font-bold text-brand-navy ml-1">Full Name</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-regular fa-user text-gray-400"></i>
                        </div>
                        <input type="text" id="fullName" placeholder="e.g. Lars Johansson" 
                            class="w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-200 rounded-[16px] text-[15px] text-brand-navy placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-navy/20 focus:border-brand-navy transition-all shadow-sm">
                    </div>
                </div>

                <!-- Email Address (Error State Example) -->
                <div class="space-y-1.5">
                    <label for="email" class="text-[13px] font-bold text-brand-navy ml-1">Email Address</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-regular fa-envelope text-brand-danger"></i>
                        </div>
                        <input type="email" id="email" value="lars.johansson@invalid" 
                            class="w-full pl-11 pr-10 py-3.5 bg-brand-danger/5 border border-brand-danger rounded-[16px] text-[15px] text-brand-navy focus:outline-none focus:ring-2 focus:ring-brand-danger/20 transition-all shadow-sm">
                        <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-circle-exclamation text-brand-danger"></i>
                        </div>
                    </div>
                    <p class="text-[12px] font-medium text-brand-danger ml-1 mt-1 flex items-center gap-1.5">
                        Please enter a valid email format
                    </p>
                </div>

                <!-- Password -->
                <div class="space-y-1.5">
                    <label for="password" class="text-[13px] font-bold text-brand-navy ml-1">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-lock text-gray-400"></i>
                        </div>
                        <input type="password" id="password" placeholder="Min. 8 characters" 
                            class="w-full pl-11 pr-12 py-3.5 bg-gray-50 border border-gray-200 rounded-[16px] text-[15px] text-brand-navy placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-navy/20 focus:border-brand-navy transition-all shadow-sm">
                        <button type="button" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-brand-navy transition-colors">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- Optional Home Address -->
                <div class="space-y-1.5">
                    <div class="flex justify-between items-baseline ml-1">
                        <label for="address" class="text-[13px] font-bold text-brand-navy">Home Address</label>
                        <span class="text-[11px] font-semibold text-gray-400 uppercase tracking-wider">Optional</span>
                    </div>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-house text-gray-400 text-sm"></i>
                        </div>
                        <input type="text" id="address" placeholder="e.g. Sveavägen 1" 
                            class="w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-200 rounded-[16px] text-[15px] text-brand-navy placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-navy/20 focus:border-brand-navy transition-all shadow-sm">
                    </div>
                </div>

                <!-- Legal Consents -->
                <div class="pt-2 space-y-3">
                    <label class="flex items-start gap-3 cursor-pointer group">
                        <input type="checkbox" class="custom-checkbox shrink-0 mt-0.5" checked>
                        <span class="text-[13px] text-gray-600 leading-snug">
                            I agree to the <a href="#" class="font-bold text-brand-navy hover:text-brand-gold transition-colors">Terms of Service</a> and <a href="#" class="font-bold text-brand-navy hover:text-brand-gold transition-colors">Privacy Policy</a>.
                        </span>
                    </label>
                </div>
            </form>

            <!-- SSO Section -->
            <div class="px-2 mb-8">
                <div class="relative flex items-center py-4">
                    <div class="flex-grow border-t border-gray-200"></div>
                    <span class="flex-shrink-0 mx-4 text-[12px] font-semibold text-gray-400 uppercase tracking-wider">Or continue with</span>
                    <div class="flex-grow border-t border-gray-200"></div>
                </div>
                
                <div class="flex gap-3">
                    <button class="flex-1 flex items-center justify-center gap-2 py-3.5 bg-white border border-gray-200 rounded-[16px] hover:bg-gray-50 transition-colors shadow-sm">
                        <i class="fa-brands fa-apple text-[18px]"></i>
                        <span class="text-[14px] font-bold text-brand-navy">Apple</span>
                    </button>
                    <button class="flex-1 flex items-center justify-center gap-2 py-3.5 bg-white border border-gray-200 rounded-[16px] hover:bg-gray-50 transition-colors shadow-sm">
                        <i class="fa-brands fa-google text-[18px] text-[#DB4437]"></i>
                        <span class="text-[14px] font-bold text-brand-navy">Google</span>
                    </button>
                </div>
            </div>
            
            <!-- Spacer to push buttons to bottom -->
            <div class="flex-grow"></div>
            
            <!-- Action Stack -->
            <div id="auth-actions" class="flex flex-col gap-4 mt-auto shrink-0 w-full px-2">
                <!-- Primary CTA -->
                <button type="submit" form="registration-form" class="w-full bg-brand-gold hover:bg-[#D5901F] text-brand-navy font-bold py-4 px-6 rounded-[16px] transition-colors shadow-[0_8px_20px_rgba(230,161,41,0.3)] flex items-center justify-center gap-2">
                    Create Account
                    <i class="fa-solid fa-arrow-right text-sm"></i>
                </button>
                
                <!-- Login Link -->
                <p class="text-center text-[14px] text-gray-500 font-medium pb-2">
                    Already have an account? 
                    <a href="#" class="font-bold text-brand-navy hover:text-brand-gold transition-colors">Log in</a>
                </p>
            </div>
        </div>
    </div>


<script defer src="/prototype-bridge.js"></script>
</body>
</html>
